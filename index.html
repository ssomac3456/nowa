<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>나와 소개 사이트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            width: 100%;
            height: 80px;
            padding:0  150px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: absolute;  
            background-color: rgba(0, 0, 0, 0.128);              
        }
        .logo{
            width: 150px;
            height: 40px;
            margin-right: 250px;
        }
        .hero_section {
            width: 100%;
            height: 100vh;
            padding: 50px 150px;
            background: url('img/hero/hero_img.jpg')center / cover no-repeat;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        .hero_subtitle h1 {
    margin: 30px 0;
}

.hero_subtitle h1 img {
    width: 200px;
}
        
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="img/header/logo_img.png" alt="Logo">
        </div>
        <div class="menu_wrap">
            <a href="#">앱 소개</a>
            <a href="#">기능 소개</a>
            <a href="#">블로그</a>
            <a href="#">문의하기</a>
        </div> 
        </header>
        <section class="hero_section">
            <div class="hero_title_wrap">
                <h3>나를 이해하는 여정의 시작</h3>
                <div class="hero_subtitle">
                    <h1>당신의 지금, <br/>
                        <img src="img/hero/hero_title_logo_img.png" alt="히어로로고">
                        가 함께 합니다.</h1>
                    <P>감정을 기록하는 것에서 나아가<br/> 
                        반복되는 패턴을 이해하고 <br/>
                        더 나다운 내일을 만들어가요.<br/>
                    </P>
                    
                </div>
                <div class="hero_btn_wrap">
                    <a href="#" class="hero_btn"><img src="img/appstore_btn.png" alt="앱스토어버튼"></a>
                    <a href="#" class="hero_btn"><img src="img/google_btn.png" alt="플레이스토어버튼"></a>
                </div>
                </section>
                <section class="section_2 section">
                    <div class="img_wrap_2 img_wrap">
                        <img src="img/sec2/section_2_img.jpg" alt="섹션2 이미지">
                    </div>
                    <div class="con_wrap">
                        <h2>클릭만으로 기록</h2>
                        <p>복잡하게 작성하지 않아도 됩니다<br/>
                            가장 가까운 감정을 클릭해<br/>
                            부담 없이 기록할수 있어요.<br/>
                        </p>
                    </div>
                    <div class="icon_wrap_2 icon_wrap">

                                <img src="img/sec2/icon_1.png" alt="아이콘1">
